name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.27.2/gitleaks_8.27.2_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          gitleaks detect --source . --redact --no-banner \
            --report-format json \
            --report-path gitleaks-report.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/java \
            --config p/owasp-top-ten \
            --severity ERROR \
            --severity WARNING \
            --json \
            --output semgrep-report.json \
            --quiet \
            .

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy fs scan
        run: |
          trivy fs . \
            --format json \
            --output trivy-report.json \
            --severity CRITICAL,HIGH \
            --quiet || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Fail on CRITICAL/HIGH findings
        run: |
          COUNT=$(python3 -c "
          import json
          data = json.load(open('trivy-report.json'))
          vulns = [v for r in (data.get('Results') or []) for v in (r.get('Vulnerabilities') or []) if v.get('Severity') in ('CRITICAL','HIGH')]
          print(len(vulns))
          ")
          echo "Found $COUNT CRITICAL/HIGH vulnerabilities"
          [ "$COUNT" -gt 0 ] && exit 1 || exit 0

  publish-reports:
    name: Publish Reports
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, trivy]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: reports

      - uses: actions/upload-artifact@v4
        with:
          name: all-security-reports
          path: reports/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, trivy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Build with Maven
        run: ./mvnw package -DskipTests -q
