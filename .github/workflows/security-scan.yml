name: Security Scan Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:

  # ---------------------------------------------------------------
  # 1. Gitleaks - secret scanning
  # ---------------------------------------------------------------
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.eval.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true   # do NOT let this stop the job/report step
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source="/repo" \
                   --report-format=json \
                   --report-path=/repo/gitleaks-report.json \
                   --exit-code=1 \
                   --no-git=false

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

      - name: Evaluate Gitleaks Result
        id: eval
        if: always()
        run: |
          if [ -s gitleaks-report.json ] && [ "$(cat gitleaks-report.json)" != "[]" ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
          else
            echo "status=pass" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------
  # 2. Semgrep - SAST
  # ---------------------------------------------------------------
  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    outputs:
      status: ${{ steps.eval.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          semgrep scan --config auto \
                        --json \
                        --output semgrep-report.json \
                        || true

      - name: Upload Semgrep Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
          if-no-files-found: warn

      - name: Evaluate Semgrep Result
        id: eval
        if: always()
        run: |
          # ERROR = semgrep's high-confidence/high-severity bucket
          HIGH_COUNT=$(jq '[.results[]? | select(.extra.severity == "ERROR")] | length' semgrep-report.json)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
          else
            echo "status=pass" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------
  # 3. Trivy - dependency / filesystem vulnerability scan
  # ---------------------------------------------------------------
  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.eval.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        id: trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH
          exit-code: 0   # don't fail this step itself; gate evaluates the report

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          if-no-files-found: warn

      - name: Evaluate Trivy Result
        id: eval
        if: always()
        run: |
          COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")] | length' trivy-report.json)
          if [ "$COUNT" -gt 0 ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
          else
            echo "status=pass" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------
  # 4. Build - gated on all three scan results
  # ---------------------------------------------------------------
  build:
    name: Build (Security Gate)
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, trivy]
    if: always()   # run even if an upstream job's scan step reported a failure
    steps:
      - uses: actions/checkout@v4

      - name: Check scan results
        run: |
          echo "Gitleaks: ${{ needs.gitleaks.outputs.status }}"
          echo "Semgrep:  ${{ needs.semgrep.outputs.status }}"
          echo "Trivy:    ${{ needs.trivy.outputs.status }}"

          if [ "${{ needs.gitleaks.outputs.status }}" = "fail" ] || \
             [ "${{ needs.semgrep.outputs.status }}" = "fail" ] || \
             [ "${{ needs.trivy.outputs.status }}" = "fail" ]; then
            echo "::error::One or more security scans found critical/high issues. Failing build."
            exit 1
          fi

          echo "All scans passed. Proceeding with build."

      - name: Build step
        run: |
          echo "Running build..."
          # your actual build commands go here