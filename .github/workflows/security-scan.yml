name: Security Scan Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      security_gate:
        description: "Enable security gate (block build on findings)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  security-events: write

jobs:

  # ---------------------------------------------------------------
  # 1. Gitleaks - secret scanning
  # ---------------------------------------------------------------
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.eval.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true   # do NOT let this stop the job/report step
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source="/repo" \
                   --report-format=json \
                   --report-path=/repo/gitleaks-report.json \
                   --exit-code=1 \
                   --no-git=false

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

      - name: Evaluate Gitleaks Result
        id: eval
        if: always()
        run: |
          if [ -s gitleaks-report.json ] && [ "$(cat gitleaks-report.json)" != "[]" ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
          else
            echo "status=pass" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------
  # 2. Semgrep - SAST
  # ---------------------------------------------------------------
  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    outputs:
      status: ${{ steps.eval.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          semgrep scan --config p/owasp-top-ten \
                        --config p/java \
                        --config p/security-audit \
                        --config p/secrets \
                        --json \
                        --output semgrep-report.json \
                        || true

      - name: Upload Semgrep Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.json
          if-no-files-found: warn

      - name: Evaluate Semgrep Result
        id: eval
        if: always()
        run: |
          # ERROR = semgrep's high-confidence/high-severity bucket
          HIGH_COUNT=$(jq '[.results[]? | select(.extra.severity == "ERROR")] | length' semgrep-report.json)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
          else
            echo "status=pass" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------
  # 3. Trivy - dependency / filesystem vulnerability scan
  # ---------------------------------------------------------------
  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.eval.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        id: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH
          exit-code: 0   # don't fail this step itself; gate evaluates the report

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          if-no-files-found: warn

      - name: Evaluate Trivy Result
        id: eval
        if: always()
        run: |
          COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")] | length' trivy-report.json)
          if [ "$COUNT" -gt 0 ]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
          else
            echo "status=pass" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------
  # 4. Build - gated on all three scan results
  # ---------------------------------------------------------------
  build:
    name: Build (Security Gate)
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, trivy]
    if: always()   # run even if an upstream job's scan step reported a failure
    steps:
      - uses: actions/checkout@v4

      - name: Check scan results
        run: |
          GATE="${{ inputs.security_gate }}"
          GATE="${GATE:-true}"

          echo "Security gate: $GATE"
          echo "Gitleaks : ${{ needs.gitleaks.outputs.status }}"
          echo "Semgrep  : ${{ needs.semgrep.outputs.status }}"
          echo "Trivy    : ${{ needs.trivy.outputs.status }}"

          if [ "$GATE" = "false" ]; then
            echo "::warning::Security gate is DISABLED. Proceeding with build regardless of findings."
            exit 0
          fi

          if [ "${{ needs.gitleaks.outputs.status }}" = "fail" ] || \
             [ "${{ needs.semgrep.outputs.status }}" = "fail" ] || \
             [ "${{ needs.trivy.outputs.status }}" = "fail" ]; then
            echo "::error::One or more security scans found critical/high issues. Failing build."
            exit 1
          fi

          echo "All scans passed. Proceeding with build."

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build with Maven
        run: ./mvnw package -DskipTests -q

      - name: Build Docker image
        run: docker build -t webgoat:${{ github.sha }} .

      - name: Scan container image with Trivy
        id: image-scan
        continue-on-error: true
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image \
            --format json \
            --output trivy-image-report.json \
            --severity CRITICAL,HIGH \
            --quiet \
            webgoat:${{ github.sha }}

      - name: Upload image scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json

      - name: Fail on image CRITICAL/HIGH findings
        if: steps.image-scan.outcome == 'failure'
        run: |
          COUNT=$(python3 -c "
          import json
          data = json.load(open('trivy-image-report.json'))
          vulns = [v for r in (data.get('Results') or []) for v in (r.get('Vulnerabilities') or []) if v.get('Severity') in ('CRITICAL','HIGH')]
          print(len(vulns))
          ")
          echo "Found $COUNT CRITICAL/HIGH vulnerabilities in container image"
          exit 1