trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:

# Install Semgrep
- task: UsePythonVersion@0
  inputs:
    name: Security Scan

    on:
      push:
        branches: [ main ]
      pull_request:
        branches: [ main ]

    jobs:
      security-scan:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: Set up Python
            uses: actions/setup-python@v4
            with:
              python-version: '3.x'

          - name: Install Semgrep
            run: |
              python -m pip install --upgrade pip
              pip install semgrep

          - name: Run Semgrep (create SARIF)
            run: |
              mkdir -p security-reports
              semgrep scan --config auto --sarif --output security-reports/semgrep.sarif
            continue-on-error: true

          - name: Install Trivy
            run: |
              wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.66.0_Linux-64bit.deb
              sudo dpkg -i trivy_0.66.0_Linux-64bit.deb
            continue-on-error: false

          - name: Run Trivy (filesystem vuln scan)
            run: |
              mkdir -p security-reports
              trivy fs . --scanners vuln --format json --output security-reports/trivy-dependencies.json
            continue-on-error: true

          - name: Upload security reports
            uses: actions/upload-artifact@v4
            with:
              name: security-reports
              path: security-reports
